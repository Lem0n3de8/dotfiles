general {
    lock_cmd = pidof hyprlock || hyprlock                                     # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session                                  # lock before suspend.
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'  # to avoid having to press a key twice to turn on the display.
}


listener {
    timeout = 120                                # 2min
    on-timeout = brightnessctl -s set 100	 # set monitor backlight to 100
    on-resume = brightnessctl -r                 # restore monitor backlight
}

listener { 
    timeout = 120                                               # 2min.
    on-timeout = brightnessctl -sd tpacpi::kbd_backlight set 0  # turn off keyboard backlight.
on-resume = brightnessctl -rd tpacpi::kbd_backlight   		# restore keyboard backlight.
}

listener {
    timeout = 150                                 # 2.5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 180                                                                                  # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'                            # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 600                                # 30min
    on-timeout = systemctl suspend                # suspend pc
}
